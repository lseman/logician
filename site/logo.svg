<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
    width="512"
    height="512"
    viewBox="0 0 512 512"
    version="1.1"
    xmlns="http://www.w3.org/2000/svg">
  <title>Logician Logo</title>
  <defs>
    <linearGradient id="bg-glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#06B6D4" stop-opacity="0.10"/>
    </linearGradient>

    <linearGradient id="bulb-fill" x1="0" y1="80" x2="0" y2="380" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F5F3FF"/>
      <stop offset="55%" stop-color="#DDD6FE"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>

    <linearGradient id="bulb-stroke" x1="120" y1="90" x2="380" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#5B21B6"/>
    </linearGradient>

    <linearGradient id="base-fill" x1="0" y1="330" x2="0" y2="460" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#C4B5FD"/>
      <stop offset="100%" stop-color="#6D28D9"/>
    </linearGradient>

    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#6D28D9" flood-opacity="0.20"/>
    </filter>
  </defs>

  <!-- subtle aura -->
  <circle cx="256" cy="205" r="170" fill="url(#bg-glow)"/>

  <!-- bulb body -->
  <g filter="url(#soft-shadow)">
    <path
      d="M256 78
         C177 78 118 136 118 215
         C118 274 151 319 193 351
         C211 365 223 384 226 404
         L286 404
         C289 384 301 365 319 351
         C361 319 394 274 394 215
         C394 136 335 78 256 78 Z"
      fill="url(#bulb-fill)"
      stroke="url(#bulb-stroke)"
      stroke-width="14"
      stroke-linejoin="round"/>
  </g>

  <!-- top highlight -->
  <path
    d="M181 132
       C156 152 142 180 142 212"
    fill="none"
    stroke="#FFFFFF"
    stroke-opacity="0.80"
    stroke-width="12"
    stroke-linecap="round"/>

  <!-- inner logic / graph mark -->
  <g transform="translate(256 224)">
    <!-- logic frame -->
    <path
      d="M-72 -48
         H10
         C44 -48 70 -22 70 12
         C70 46 44 72 10 72
         H-72"
      fill="none"
      stroke="#5B21B6"
      stroke-width="14"
      stroke-linecap="round"
      stroke-linejoin="round"/>

    <!-- reasoning rails -->
    <line x1="-72" y1="-20" x2="4" y2="-20" stroke="#6D28D9" stroke-width="10" stroke-linecap="round"/>
    <line x1="-72" y1="12" x2="20" y2="12" stroke="#6D28D9" stroke-width="10" stroke-linecap="round"/>
    <line x1="-72" y1="44" x2="4" y2="44" stroke="#6D28D9" stroke-width="10" stroke-linecap="round"/>

    <!-- nodes -->
    <circle cx="-26" cy="-20" r="9" fill="#FFFFFF" stroke="#5B21B6" stroke-width="5"/>
    <circle cx="20" cy="12" r="9" fill="#FFFFFF" stroke="#5B21B6" stroke-width="5"/>
    <circle cx="-8" cy="44" r="9" fill="#FFFFFF" stroke="#5B21B6" stroke-width="5"/>
    <circle cx="46" cy="12" r="10" fill="#FFFFFF" stroke="#5B21B6" stroke-width="5"/>

    <!-- inference edges -->
    <line x1="-26" y1="-20" x2="20" y2="12" stroke="#7C3AED" stroke-width="5" stroke-linecap="round"/>
    <line x1="20" y1="12" x2="-8" y2="44" stroke="#7C3AED" stroke-width="5" stroke-linecap="round"/>
    <line x1="20" y1="12" x2="46" y2="12" stroke="#06B6D4" stroke-width="6" stroke-linecap="round"/>
  </g>

  <!-- neck rings -->
  <g>
    <rect x="214" y="401" width="84" height="18" rx="9" fill="#7C3AED"/>
    <rect x="206" y="421" width="100" height="18" rx="9" fill="#8B5CF6"/>
  </g>

  <!-- bulb base -->
  <path
    d="M196 440
       H316
       V468
       C316 486 302 498 284 498
       H228
       C210 498 196 486 196 468 Z"
    fill="url(#base-fill)"
    stroke="#5B21B6"
    stroke-width="10"
    stroke-linejoin="round"/>

  <!-- small terminal / spark -->
  <rect x="236" y="490" width="40" height="10" rx="5" fill="#4C1D95"/>

  <!-- accent point -->
  <circle cx="344" cy="132" r="8" fill="#FFFFFF" fill-opacity="0.85"/>
</svg>
